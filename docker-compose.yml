services:
  iaport:
    build: .
    container_name: iaport
    ports:
      - "8080:8080"
    environment:
      - IA_BUCKET=${IA_BUCKET}
      - IA_ACCESS_KEY=${IA_ACCESS_KEY}
      - IA_SECRET_KEY=${IA_SECRET_KEY}
      - LOGIN_PIN=${LOGIN_PIN:-2383}
      - WORKER_MEDIA_BASE=${WORKER_MEDIA_BASE}
      - FLASK_SECRET=${FLASK_SECRET}
    restart: unless-stopped

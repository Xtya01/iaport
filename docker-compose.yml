version: '3.8'
services:
  ia-drive:
    build: .
    container_name: ia-drive
    ports:
      - "8080:8080"  # Web UI
      - "8081:8081"  # WebDAV
    environment:
      - FLASK_SECRET=change-this-to-random-string
      - LOGIN_PIN=2580
      - IA_BUCKET=junk-manage-caution
      - IA_ACCESS_KEY=${IA_ACCESS_KEY}
      - IA_SECRET_KEY=${IA_SECRET_KEY}
      - WORKER_MEDIA_BASE=https://your-worker.workers.dev
    restart: unless-stopped
    volumes:
      - ./data:/tmp/ia-cache

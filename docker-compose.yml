version: '3.8'
services:
  ia-drive:
    build: .
    container_name: ia-drive
    ports:
      - "8080:8080"
    environment:
      - IA_BUCKET=${IA_BUCKET}
      - IA_ACCESS_KEY=${IA_ACCESS_KEY}
      - IA_SECRET_KEY=${IA_SECRET_KEY}
      - LOGIN_PIN=${LOGIN_PIN:-2383}
      - WORKER_MEDIA_BASE=${WORKER_MEDIA_BASE}
    volumes:
      - ia-drive-data:/data
    restart: unless-stopped

volumes:
  ia-drive-data:
    driver: local

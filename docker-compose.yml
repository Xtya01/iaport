version: '3.8'
services:
  ia-drive:
    build: .
    container_name: ia-drive
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - FLASK_SECRET=change-this-to-random-32-chars
      - LOGIN_PIN=2580
      - IA_BUCKET=junk-manage-caution
      - IA_ACCESS_KEY=${IA_ACCESS_KEY}
      - IA_SECRET_KEY=${IA_SECRET_KEY}
      - WORKER_MEDIA_BASE=https://ia-drive.visdrive.workers.dev
    restart: unless-stopped
    env_file:
      - .env

version: "3.9"

services:
  ia-drive:
    container_name: ia-drive
    image: python:3.11-slim
    ports:
      - "8080:8080"
    environment:
      - IA_BUCKET=junk-manage-caution
      - IA_ACCESS_KEY=${IA_ACCESS_KEY}
      - IA_SECRET_KEY=${IA_SECRET_KEY}
      - WORKER_MEDIA_BASE=${WORKER_MEDIA_BASE}
      - LOGIN_PIN=2580
      - FLASK_SECRET=${FLASK_SECRET}
    volumes:
      - ia-data:/tmp
    # Pulls latest code from GitHub on every deploy
    command: >
      bash -c "apt-get update -qq && apt-get install -y -qq git > /dev/null &&
      rm -rf /app && git clone https://github.com/yourusername/ia-drive.git /app &&
      cd /app && pip install --no-cache-dir -r requirements.txt &&
      python app.py"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health || wget -qO- http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  ia-data:

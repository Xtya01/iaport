<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>IA Drive</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<link rel="manifest" href="/manifest.json">
<style>
body{background:#000;color:#fff;font-family:Inter,system-ui}
.k-card{background:#111;border:1px solid #222}
.k-btn:hover{background:#1a1a1a}
.scroll::-webkit-scrollbar{width:6px} .scroll::-webkit-scrollbar-thumb{background:#333}
</style>
</head>
<body class="min-h-screen">
<div id="login" class="h-screen flex items-center justify-center">
  <div class="k-card p-8 rounded-2xl w-80 shadow-2xl">
    <div class="flex items-center justify-center gap-2 mb-6">
      <i data-lucide="hard-drive" class="w-7 h-7"></i>
      <h1 class="text-2xl font-bold">IA Drive</h1>
    </div>
    <input id="pin" type="password" placeholder="Enter PIN" class="w-full p-3 rounded-lg bg-black border border-zinc-800 mb-4 focus:outline-none focus:border-white">
    <button onclick="doLogin()" class="w-full bg-white text-black p-3 rounded-lg font-semibold flex items-center justify-center gap-2"><i data-lucide="lock-open" class="w-4 h-4"></i>Unlock</button>
    <p class="text-xs text-zinc-600 mt-3 text-center">Private Internet Archive</p>
  </div>
</div>

<div id="app" class="hidden h-screen flex">
  <aside class="w-60 k-card p-4 hidden md:flex flex-col">
    <div class="flex items-center gap-2 mb-6">
      <i data-lucide="hard-drive" class="w-5 h-5"></i>
      <h2 class="font-bold">IA Drive</h2>
    </div>
    <nav class="space-y-1 text-sm" id="filters">
      <button data-t="all" class="w-full flex items-center gap-3 p-2.5 rounded-lg bg-zinc-800"><i data-lucide="folder" class="w-4 h-4"></i>All Files</button>
      <button data-t="videos" class="w-full flex items-center gap-3 p-2.5 rounded-lg hover:bg-zinc-800 k-btn"><i data-lucide="film" class="w-4 h-4"></i>Videos</button>
      <button data-t="audio" class="w-full flex items-center gap-3 p-2.5 rounded-lg hover:bg-zinc-800 k-btn"><i data-lucide="music" class="w-4 h-4"></i>Audio</button>
      <button data-t="images" class="w-full flex items-center gap-3 p-2.5 rounded-lg hover:bg-zinc-800 k-btn"><i data-lucide="image" class="w-4 h-4"></i>Images</button>
      <button data-t="documents" class="w-full flex items-center gap-3 p-2.5 rounded-lg hover:bg-zinc-800 k-btn"><i data-lucide="file-text" class="w-4 h-4"></i>Documents</button>
    </nav>
    <div class="mt-auto pt-4 border-t border-zinc-800">
      <div class="text-xs text-zinc-500 flex items-center gap-2"><i data-lucide="database" class="w-3 h-3"></i> Internet Archive</div>
    </div>
  </aside>

  <main class="flex-1 flex flex-col min-w-0">
    <header class="k-card p-3 flex items-center gap-2 sticky top-0 z-30">
      <div class="relative flex-1">
        <i data-lucide="search" class="w-4 h-4 absolute left-3 top-2.5 text-zinc-500"></i>
        <input id="q" placeholder="Search files" class="w-full bg-black border border-zinc-800 rounded-lg pl-9 pr-3 py-2 text-sm focus:outline-none focus:border-zinc-600" oninput="load()">
      </div>
      <button onclick="toggleView()" class="p-2.5 k-card rounded-lg hover:bg-zinc-900" title="Toggle view"><i data-lucide="layout-grid" class="w-4 h-4" id="viewIcon"></i></button>
      
      <div class="relative">
        <button id="uploadBtn" class="px-3 py-2 bg-white text-black rounded-lg text-sm font-semibold flex items-center gap-1.5 hover:bg-zinc-200"><i data-lucide="upload" class="w-4 h-4"></i>Upload</button>
        <div id="uploadMenu" class="hidden absolute right-0 mt-2 w-52 k-card rounded-xl p-1.5 shadow-2xl z-40 border-zinc-700">
          <button onclick="triggerFile()" class="w-full flex items-center gap-3 px-3 py-2.5 hover:bg-zinc-800 rounded-lg text-sm"><i data-lucide="file-up" class="w-4 h-4"></i>Upload files</button>
          <button onclick="triggerFolder()" class="w-full flex items-center gap-3 px-3 py-2.5 hover:bg-zinc-800 rounded-lg text-sm"><i data-lucide="folder-up" class="w-4 h-4"></i>Upload folder</button>
          <button onclick="showUrlModal()" class="w-full flex items-center gap-3 px-3 py-2.5 hover:bg-zinc-800 rounded-lg text-sm"><i data-lucide="link" class="w-4 h-4"></i>From URL</button>
          <div class="border-t border-zinc-800 my-1"></div>
          <button onclick="document.getElementById('drop').click()" class="w-full flex items-center gap-3 px-3 py-2.5 hover:bg-zinc-800 rounded-lg text-sm text-zinc-400"><i data-lucide="info" class="w-4 h-4"></i>Drag & drop enabled</button>
        </div>
      </div>
    </header>

    <div id="drop" class="flex-1 overflow-auto p-4 scroll" ondrop="handleDrop(event)" ondragover="event.preventDefault();this.classList.add('bg-zinc-950')" ondragleave="this.classList.remove('bg-zinc-950')">
      <div id="crumbs" class="text-xs text-zinc-500 mb-3 flex items-center gap-1"></div>
      <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-3"></div>
      <div id="list" class="hidden divide-y divide-zinc-900 rounded-xl overflow-hidden border border-zinc-900"></div>
      <div id="empty" class="hidden text-center py-20 text-zinc-600">
        <i data-lucide="folder-x" class="w-12 h-12 mx-auto mb-3 opacity-50"></i>
        <p>No files found</p>
      </div>
    </div>

    <div id="bulkBar" class="hidden k-card p-3 flex items-center gap-3 border-t border-zinc-800">
      <span id="selCount" class="text-sm"></span>
      <div class="flex-1"></div>
      <button onclick="bulkDelete()" class="px-3 py-1.5 bg-red-600 hover:bg-red-700 rounded-lg text-sm flex items-center gap-1.5"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i>Delete</button>
      <button onclick="clearSelection()" class="px-3 py-1.5 k-card rounded-lg text-sm">Cancel</button>
    </div>
  </main>
</div>

<!-- Hidden inputs -->
<input id="fileIn" type="file" multiple class="hidden" onchange="uploadFiles(this.files)">
<input id="folderIn" type="file" webkitdirectory class="hidden" onchange="uploadFiles(this.files)">

<!-- Context Menu -->
<div id="ctx" class="hidden fixed z-50 k-card rounded-xl p-1.5 shadow-2xl w-48 border-zinc-700">
  <button data-a="open" class="w-full flex items-center gap-3 px-3 py-2 hover:bg-zinc-800 rounded-lg text-sm"><i data-lucide="external-link" class="w-4 h-4"></i>Open</button>
  <button data-a="copy" class="w-full flex items-center gap-3 px-3 py-2 hover:bg-zinc-800 rounded-lg text-sm"><i data-lucide="copy" class="w-4 h-4"></i>Copy link</button>
  <button data-a="share" class="w-full flex items-center gap-3 px-3 py-2 hover:bg-zinc-800 rounded-lg text-sm"><i data-lucide="share-2" class="w-4 h-4"></i>Share</button>
  <button data-a="download" class="w-full flex items-center gap-3 px-3 py-2 hover:bg-zinc-800 rounded-lg text-sm"><i data-lucide="download" class="w-4 h-4"></i>Download</button>
  <div class="border-t border-zinc-800 my-1"></div>
  <button data-a="delete" class="w-full flex items-center gap-3 px-3 py-2 hover:bg-red-950 text-red-400 rounded-lg text-sm"><i data-lucide="trash-2" class="w-4 h-4"></i>Delete</button>
</div>

<!-- URL Modal -->
<div id="urlModal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
  <div class="k-card rounded-2xl p-6 w-full max-w-md">
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-semibold flex items-center gap-2"><i data-lucide="link" class="w-5 h-5"></i>Upload from URL</h3>
      <button onclick="hideUrlModal()" class="p-1 hover:bg-zinc-800 rounded"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>
    <input id="urlInput" placeholder="https://example.com/file.mp4" class="w-full p-3 rounded-lg bg-black border border-zinc-800 mb-3 focus:outline-none focus:border-white">
    <input id="urlName" placeholder="Optional filename" class="w-full p-3 rounded-lg bg-black border border-zinc-800 mb-4 focus:outline-none focus:border-white">
    <div class="flex gap-2">
      <button onclick="doUrlUpload()" class="flex-1 bg-white text-black py-2.5 rounded-lg font-medium">Upload</button>
      <button onclick="hideUrlModal()" class="px-4 py-2.5 k-card rounded-lg">Cancel</button>
    </div>
    <p class="text-xs text-zinc-600 mt-3">Files up to 100GB supported</p>
  </div>
</div>

<!-- Viewer -->
<div id="viewer" class="fixed inset-0 bg-black/95 hidden items-center justify-center z-50 p-4" onclick="if(event.target.id==='viewer')this.classList.add('hidden')">
  <button onclick="document.getElementById('viewer').classList.add('hidden')" class="absolute top-4 right-4 p-2 hover:bg-zinc-900 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
  <video id="player" class="max-w-[90vw] max-h-[90vh] rounded-xl" controls playsinline></video>
  <img id="imgview" class="max-w-[90vw] max-h-[90vh] rounded-xl hidden">
</div>

<!-- Progress Toast -->
<div id="toast" class="fixed bottom-4 right-4 k-card rounded-xl p-4 shadow-2xl hidden min-w-[300px] z-50">
  <div class="flex items-center gap-3">
    <i data-lucide="upload-cloud" class="w-5 h-5 animate-pulse"></i>
    <div class="flex-1">
      <div class="text-sm font-medium" id="toastTitle">Uploading...</div>
      <div class="w-full bg-zinc-800 rounded-full h-1.5 mt-2"><div id="toastBar" class="bg-white h-1.5 rounded-full transition-all" style="width:0%"></div></div>
    </div>
  </div>
</div>

<script>
lucide.createIcons();
let view='grid', type='all', prefix='', selected=new Set(), files=[], ctxFile=null; window.WORKER_BASE = 'https://your-worker.workers.dev';

const api = async (p,o={})=>{ const r=await fetch(p,{...o,credentials:'include'}); if(r.status===401)location.reload(); return r.json() };

async function doLogin(){ const pin=document.getElementById('pin').value; const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin}),credentials:'include'}); if(r.ok){document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');load()} else alert('Wrong PIN') }

async function load(){ const q=document.getElementById('q').value; const d=await api(`/api/list?type=${type}&prefix=${prefix}&q=${encodeURIComponent(q)}`); files=d.files||[]; render(); lucide.createIcons() }

function getFileIcon(name){
  const ext = name.split('.').pop().toLowerCase();
  const map = {
    mp3:'file-music', wav:'file-music', flac:'file-music', m4a:'file-music', aac:'file-music', ogg:'file-music', opus:'file-music',
    mp4:'file-video', mkv:'file-video', webm:'file-video', mov:'file-video', avi:'file-video', m4v:'file-video', mpg:'file-video',
    jpg:'file-image', jpeg:'file-image', png:'file-image', gif:'file-image', webp:'file-image', svg:'file-image', bmp:'file-image', ico:'file-image',
    pdf:'file-text',
    doc:'file-text', docx:'file-text', txt:'file-text', md:'file-text', rtf:'file-text', log:'file-text',
    zip:'file-archive', rar:'file-archive', '7z':'file-archive', tar:'file-archive', gz:'file-archive', torrent:'file-archive',
    sqlite:'database', db:'database', sql:'database',
    js:'file-code', ts:'file-code', py:'file-code', html:'file-code', css:'file-code', json:'file-code', xml:'file-code',
    xls:'file-spreadsheet', xlsx:'file-spreadsheet', csv:'file-spreadsheet',
    ppt:'presentation', pptx:'presentation'
  };
  return map[ext] || 'file';
}

function render(){
  const g=document.getElementById('grid'), l=document.getElementById('list'), empty=document.getElementById('empty');
  g.innerHTML=''; l.innerHTML=''; empty.classList.toggle('hidden', files.length>0);
  files.forEach(f=>{
    const isSel=selected.has(f.key);
    const card=document.createElement('div');
    card.className=`k-card rounded-xl p-2.5 cursor-pointer group relative hover:border-zinc-700 transition-all ${isSel?'ring-1 ring-white':''}`;
    card.innerHTML=`<input type="checkbox" ${isSel?'checked':''} class="absolute top-2.5 left-2.5 z-10 w-4 h-4 rounded bg-black border-zinc-700" onchange="toggleSel('${f.key}',this.checked,event)">
      <div class="aspect-video bg-zinc-950 rounded-lg overflow-hidden flex items-center justify-center relative">
        ${f.type==='image'?`<img src="${f.thumb}" class="w-full h-full object-cover" onerror="this.style.display='none'">`:f.type==='video'?`<img src="${f.thumb}" class="w-full h-full object-cover" onerror="this.parentElement.innerHTML='<i data-lucide=\'file-video\' class=\'w-10 h-10 text-zinc-700\'></i>'">`:`<i data-lucide="${getFileIcon(f.name)}" class="w-10 h-10 text-zinc-700"></i>`}
        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/40 transition-all flex items-center justify-center opacity-0 group-hover:opacity-100">
          <i data-lucide="maximize-2" class="w-5 h-5"></i>
        </div>
      </div>
      <div class="mt-2.5 flex items-start justify-between gap-2">
        <div class="min-w-0 flex-1">
          <div class="text-[13px] truncate font-medium">${f.name}</div>
          <div class="text-[11px] text-zinc-500 mt-0.5">${fmt(f.size)} • ${timeAgo(f.modified)}</div>
        </div>
        <button class="p-1 hover:bg-zinc-800 rounded opacity-0 group-hover:opacity-100" onclick="showCtx(event,'${f.key}')"><i data-lucide="more-vertical" class="w-3.5 h-3.5"></i></button>
      </div>`;
    card.oncontextmenu=e=>{e.preventDefault();showCtx(e,f.key)}; card.onclick=e=>{if(e.target.tagName!=='INPUT'&&!e.target.closest('button'))openFile(f)}; g.appendChild(card);

    const row=document.createElement('div');
    row.className=`flex items-center gap-3 p-3 hover:bg-zinc-950 cursor-pointer ${isSel?'bg-zinc-950':''}`;
    row.innerHTML=`<input type="checkbox" ${isSel?'checked':''} onchange="toggleSel('${f.key}',this.checked,event)" class="w-4 h-4 rounded bg-black border-zinc-700"><i data-lucide="${getFileIcon(f.name)}" class="w-4 h-4 text-zinc-500"></i><span class="flex-1 truncate text-sm">${f.name}</span><span class="text-xs text-zinc-600">${fmt(f.size)}</span><span class="text-xs text-zinc-700 hidden sm:block">${timeAgo(f.modified)}</span>`;
    row.onclick=()=>openFile(f); l.appendChild(row);
  });
  document.getElementById('grid').classList.toggle('hidden',view!=='grid');
  document.getElementById('list').classList.toggle('hidden',view!=='list');
  document.getElementById('viewIcon').setAttribute('data-lucide', view==='grid'?'list':'layout-grid');
  lucide.createIcons();
}

function fmt(b){ if(b<1024) return b+' B'; if(b<1e6) return (b/1024).toFixed(1)+' KB'; if(b<1e9) return (b/1e6).toFixed(1)+' MB'; return (b/1e9).toFixed(1)+' GB' }
function timeAgo(s){ if(!s) return ''; const d=(Date.now()-new Date(s))/1000; if(d<3600) return Math.floor(d/60)+'m'; if(d<86400) return Math.floor(d/3600)+'h'; return Math.floor(d/86400)+'d' }

function toggleView(){ view=view==='grid'?'list':'grid'; render() }
document.getElementById('filters').onclick=e=>{ const b=e.target.closest('button'); if(!b) return; type=b.dataset.t; document.querySelectorAll('#filters button').forEach(x=>x.classList.remove('bg-zinc-800')); b.classList.add('bg-zinc-800'); load() }

function openFile(f){ const v=document.getElementById('viewer'), p=document.getElementById('player'), i=document.getElementById('imgview'); v.classList.remove('hidden'); v.classList.add('flex'); if(f.type==='video'||f.type==='audio'){i.classList.add('hidden');p.classList.remove('hidden');p.src=f.url;p.play()} else if(f.type==='image'){p.pause();p.classList.add('hidden');i.classList.remove('hidden');i.src=f.url} else window.open(f.url,'_blank') }

function showCtx(e,key){ e.preventDefault(); e.stopPropagation(); ctxFile=files.find(x=>x.key===key); const m=document.getElementById('ctx'); m.style.left=Math.min(e.clientX,window.innerWidth-200)+'px'; m.style.top=Math.min(e.clientY,window.innerHeight-250)+'px'; m.classList.remove('hidden'); lucide.createIcons() }
document.addEventListener('click',()=>document.getElementById('ctx').classList.add('hidden'));
document.getElementById('ctx').onclick=async e=>{ const a=e.target.closest('button')?.dataset.a; if(!a||!ctxFile) return; const f=ctxFile; if(a==='open')openFile(f); if(a==='copy'){navigator.clipboard.writeText(f.url);toast('Link copied')} if(a==='share'){const r=await api('/api/share',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({file:f.key})}); const url=location.origin+r.url; navigator.clipboard.writeText(url); toast('Share link copied')} if(a==='download'){ const WORKER = window.WORKER_BASE || ''; window.open(WORKER ? `${WORKER}/download/${f.key}` : f.direct, '_blank'); } if(a==='delete'&&confirm('Delete '+f.name+'?')){await api('/api/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:f.key})});load()} };

function toggleSel(k,c,ev){ ev?.stopPropagation(); c?selected.add(k):selected.delete(k); document.getElementById('bulkBar').classList.toggle('hidden',selected.size===0); document.getElementById('selCount').textContent=selected.size+' selected'; render() }
function clearSelection(){ selected.clear(); document.getElementById('bulkBar').classList.add('hidden'); render() }
async function bulkDelete(){ if(!confirm('Delete '+selected.size+' files?'))return; await api('/api/bulk',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'delete',keys:[...selected]})}); clearSelection(); load() }

// Upload menu
const upBtn=document.getElementById('uploadBtn'), upMenu=document.getElementById('uploadMenu');
upBtn.onclick=()=>upMenu.classList.toggle('hidden');
document.addEventListener('click',e=>{if(!upBtn.contains(e.target)&&!upMenu.contains(e.target))upMenu.classList.add('hidden')});
function triggerFile(){ upMenu.classList.add('hidden'); document.getElementById('fileIn').click() }
function triggerFolder(){ upMenu.classList.add('hidden'); document.getElementById('folderIn').click() }
function showUrlModal(){ upMenu.classList.add('hidden'); document.getElementById('urlModal').classList.remove('hidden'); document.getElementById('urlInput').focus() }
function hideUrlModal(){ document.getElementById('urlModal').classList.add('hidden') }
async function doUrlUpload(){ const url=document.getElementById('urlInput').value; const name=document.getElementById('urlName').value; if(!url)return; hideUrlModal(); toast('Queuing URL...'); const WORKER = window.WORKER_BASE || ''; try { if(WORKER){ await fetch(`${WORKER}/api/fetch`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url,key:name})}); toast('Fetching in background'); } else { const r=await api('/api/url-upload',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url,key:name||undefined})}); toast(r.ok?'Uploaded':'Error'); } } catch(e){ toast('Error') } setTimeout(load,2000) }

async function uploadFiles(list){ const files=[...list]; if(!files.length)return; const t=document.getElementById('toast'); t.classList.remove('hidden'); const WORKER = window.WORKER_BASE || ''; for(let i=0;i<files.length;i++){ const f=files[i]; document.getElementById('toastTitle').textContent=`Uploading ${f.name}`; const key = prefix ? prefix+'/'+(f.webkitRelativePath||f.name) : (f.webkitRelativePath||f.name); try { if(f.size > 100*1024*1024 && WORKER) { // Use Worker direct stream for >100MB
            await fetch(`${WORKER}/upload?name=${encodeURIComponent(key)}`, {method:'PUT', body:f, duplex:'half'});
          } else {
            const fd=new FormData(); fd.append('file',f); fd.append('key',key); await fetch('/api/upload',{method:'POST',body:fd,credentials:'include'});
          }
        } catch(e){ console.error(e); }
        document.getElementById('toastBar').style.width=((i+1)/files.length*100)+'%' } setTimeout(()=>t.classList.add('hidden'),800); document.getElementById('toastBar').style.width='0%'; load() }
function handleDrop(e){ e.preventDefault(); e.currentTarget.classList.remove('bg-zinc-950'); uploadFiles(e.dataTransfer.files) }

function toast(msg){ const t=document.getElementById('toast'); document.getElementById('toastTitle').textContent=msg; t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'),2000) }

document.getElementById('pin').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js')}
lucide.createIcons();
</script>
</body>
</html>

<!DOCTYPE html><html class="dark"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>IA Drive</title><script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest"></script><style>body{background:#000;color:#fff;font-family:Inter} .k{background:#111;border:1px solid #222} .toast{position:fixed;bottom:20px;right:20px;padding:12px 16px;border-radius:8px;z-index:100} .success{background:#065f46} .error{background:#7f1d1d} .info{background:#111;border:1px solid #333}</style></head><body>
<div id="login" class="h-screen flex items-center justify-center"><div class="k p-8 rounded-2xl w-80"><h1 class="text-2xl font-bold mb-6 text-center">IA Drive</h1><input id="pin" type="password" placeholder="PIN" class="w-full p-3 rounded bg-black border border-zinc-800 mb-3"><button onclick="doLogin()" class="w-full bg-white text-black p-3 rounded font-semibold">Unlock</button></div></div>
<div id="app" class="hidden h-screen flex flex-col"><header class="k p-3 flex gap-2"><input id="q" placeholder="Search" class="flex-1 bg-black border border-zinc-800 rounded px-3 py-2"><button onclick="load()" class="p-2 k rounded"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button><button onclick="showUrl()" class="px-3 py-2 bg-white text-black rounded text-sm">URL Upload</button></header><div class="flex-1 overflow-auto p-4"><div id="grid" class="grid grid-cols-4 gap-3"></div></div></div>

<div id="urlmodal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center"><div class="k p-6 rounded-xl w-96"><h3 class="font-bold mb-4">Upload from URL</h3><input id="urlin" placeholder="https://" class="w-full p-2 bg-black border border-zinc-800 rounded mb-2"><input id="urlname" placeholder="filename (optional)" class="w-full p-2 bg-black border border-zinc-800 rounded mb-4"><div class="flex gap-2"><button onclick="doUrl()" class="flex-1 bg-white text-black py-2 rounded">Upload</button><button onclick="hideUrl()" class="flex-1 k py-2 rounded">Cancel</button></div><div id="urlstatus" class="text-xs text-zinc-500 mt-3"></div></div></div>
<div id="toasts" class="fixed bottom-4 right-4 space-y-2"></div>

<script>
lucide.createIcons(); let files=[];
function toast(m,k='info'){const t=document.createElement('div');t.className='toast '+k;t.textContent=m;toasts.appendChild(t);setTimeout(()=>t.remove(),4000)}
async function api(p,o){const r=await fetch(p,{...o,credentials:'include',headers:{'Content-Type':'application/json',...o?.headers}});if(!r.ok)throw new Error((await r.json()).error);return r.json()}
async function doLogin(){await api('/api/login',{method:'POST',body:JSON.stringify({pin:pin.value})});login.classList.add('hidden');app.classList.remove('hidden');load()}
async function load(){const d=await api('/api/list');files=d.files;grid.innerHTML=files.map(f=>`<div class="k p-3 rounded"><div class="text-sm truncate">${f.name}</div><div class="text-xs text-zinc-600">${(f.size/1024/1024).toFixed(1)} MB</div></div>`).join('')}
function showUrl(){urlmodal.classList.remove('hidden')} function hideUrl(){urlmodal.classList.add('hidden')}

async function doUrl(){
  const url = urlin.value.trim(); const name = urlname.value || url.split('/').pop().split('?')[0];
  hideUrl(); urlstatus.textContent='';
  
  try {
    // 1. Check size
    const head = await fetch(url, {method:'HEAD', mode:'cors'}).catch(()=>null);
    let size = 0;
    if(head && head.ok) size = parseInt(head.headers.get('content-length')||'0');
    
    if(size > 0 && size < 1024*1024*1024) {
      // <1GB: use server-side (VPS downloads)
      toast(`Server downloading ${(size/1024/1024).toFixed(0)}MB...`, 'info');
      await api('/api/url-upload',{method:'POST',body:JSON.stringify({url,key:name})});
      toast('✓ Upload complete', 'success');
    } else {
      // >1GB or unknown size: browser streams direct to IA
      toast(`Large file detected - streaming direct to IA`, 'info');
      
      // Get size via range request if HEAD failed
      if(!size){
        const test = await fetch(url, {headers:{Range:'bytes=0-0'}});
        const cr = test.headers.get('content-range');
        if(cr) size = parseInt(cr.split('/')[1]);
      }
      
      const chunkSize = 100*1024*1024; // 100MB
      const parts = Math.ceil(size / chunkSize);
      
      // Init multipart
      const init = await api('/api/multipart/init',{method:'POST',body:JSON.stringify({key:name})});
      const uploaded = [];
      
      for(let i=0; i<parts; i++){
        const start = i*chunkSize;
        const end = Math.min(start+chunkSize-1, size-1);
        
        // Fetch chunk from source
        const chunkRes = await fetch(url, {headers:{Range:`bytes=${start}-${end}`}});
        const chunk = await chunkRes.arrayBuffer();
        
        // Get presigned URL
        const {url:putUrl} = await api('/api/multipart/part',{method:'POST',body:JSON.stringify({key:name,uploadId:init.uploadId,part:i+1})});
        
        // Upload to IA directly
        const put = await fetch(putUrl, {method:'PUT', body:chunk});
        uploaded.push({ETag: put.headers.get('ETag'), PartNumber:i+1});
        
        toast(`Uploading ${name}: ${Math.round((i+1)/parts*100)}%`, 'info');
      }
      
      await api('/api/multipart/complete',{method:'POST',body:JSON.stringify({key:name,uploadId:init.uploadId,parts:uploaded})});
      toast('✓ Large upload complete', 'success');
    }
    load();
  } catch(e){
    toast('Upload failed: '+e.message, 'error');
  }
}
</script></body></html>
